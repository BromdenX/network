name: Generate routing rules

on:
  push:
    branches:
      - main
    paths:
      - Raw_Direct.txt
      - Raw_Proxy.txt
      - config/special_rules.yaml
      - scripts/generate_rules.py
      - AutoProxy.list
      - MyRules.sgmodule
      - ToDirect.yaml
      - ToProxy.yaml
      - .github/workflows/generate-rules.yml
  pull_request:
    branches:
      - main
    paths:
      - Raw_Direct.txt
      - Raw_Proxy.txt
      - config/special_rules.yaml
      - scripts/generate_rules.py
      - AutoProxy.list
      - MyRules.sgmodule
      - ToDirect.yaml
      - ToProxy.yaml
      - .github/workflows/generate-rules.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: routing-rules-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Generate and validate rules
        run: python3 scripts/generate_rules.py

      - name: Run generator tests
        run: python3 -m unittest discover -s tests -v

      - name: Verify generated files are committed in pull requests
        if: github.event_name == 'pull_request'
        run: git diff --exit-code -- AutoProxy.list MyRules.sgmodule ToDirect.yaml ToProxy.yaml

      - name: Commit generated files
        if: github.event_name != 'pull_request'
        run: |
          if git diff --quiet -- AutoProxy.list MyRules.sgmodule ToDirect.yaml ToProxy.yaml; then
            echo "Generated files are already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add AutoProxy.list MyRules.sgmodule ToDirect.yaml ToProxy.yaml
          git commit -m "Update generated routing rules"
          git push
